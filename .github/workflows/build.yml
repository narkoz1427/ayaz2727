name: Build libayaznative

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Android NDK Kur
        uses: android-actions/setup-android@v3

      - name: NDK Yukle
        run: |
          echo "y" | sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_SDK_ROOT
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: ARM64 Derle
        run: |
          mkdir -p build_arm64
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S . -B build_arm64
          cmake --build build_arm64 --target ayaznative

      - name: x86_64 Derle
        run: |
          mkdir -p build_x86_64
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -S . -B build_x86_64
          cmake --build build_x86_64 --target ayaznative

      - name: Dosyalari Topla
        run: |
          mkdir -p output/arm64-v8a output/x86_64
          cp build_arm64/libayaznative.so  output/arm64-v8a/
          cp build_x86_64/libayaznative.so output/x86_64/

      - name: arm64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libayaznative-arm64
          path: output/arm64-v8a/libayaznative.so
          retention-days: 7

      - name: x86_64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libayaznative-x86_64
          path: output/x86_64/libayaznative.so
          retention-days: 7
